# Render blueprint. In Render: New + > Blueprint, connect this repo, then set
# the two secret env vars (DATABASE_URL, GOOGLE_API_KEY) in the dashboard.
services:
  - type: web
    name: rag-demo
    runtime: docker
    plan: free
    region: frankfurt          # closest free region to Neon (London) + UK
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL       # Neon connection string (secret)
        sync: false
      - key: GOOGLE_API_KEY     # Gemini key (secret)
        sync: false
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: EMBEDDING_DIM
        value: "768"
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
      - key: CHUNK_STRATEGY
        value: structured
      - key: TOP_K
        value: "4"
# Render sets $PORT automatically; the Dockerfile CMD binds to it.
